<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahadev Platform</title>

<!-- Meta Pixel Code -->
<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];
t=b.createElement(e);t.async=!0;
t.src=v;
s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s);
}(window, document,'script',
'https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'YOUR_PIXEL_ID'); 
fbq('track', 'PageView');
</script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

body{
    background: linear-gradient(135deg,#0f172a,#020617);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:100%;
    max-width:400px;
    padding:20px;
}

.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius:15px;
    padding:25px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

.logo{
    font-size:26px;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    font-size:14px;
    color:#aaa;
    margin-bottom:25px;
}

.option{
    background: rgba(255,255,255,0.07);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    transition:0.3s;
}

.option:hover{
    transform: translateY(-3px);
}

.btn{
    display:block;
    margin-top:10px;
    padding:14px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    color:white;
    transition:0.3s;
}

.new{
    background: linear-gradient(45deg,#22c55e,#16a34a);
}

.active{
    background: linear-gradient(45deg,#3b82f6,#2563eb);
}

.btn:hover{
    opacity:0.9;
}

.footer{
    margin-top:15px;
    font-size:12px;
    color:#777;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<div class="logo">🚩 Mahadev</div>
<div class="subtitle">Secure Access Platform</div>

<div class="option">
<h3>New User</h3>
<p>Create your new ID</p>

<a href="https://wa.me/91XXXXXXXXXX?text=I want new ID" 
onclick="fbq('track','Lead',{content_name:'New ID'});" 
class="btn new">
Create New ID
</a>
</div>

<div class="option">
<h3>Already Registered</h3>
<p>Continue with active number</p>

<a href="https://wa.me/91XXXXXXXXXX?text=I have active ID" 
onclick="fbq('track','Contact',{content_name:'Active ID'});" 
class="btn active">
Login / Continue
</a>
</div>

<div class="footer">
Fast • Secure • 24x7 Support
</div>

</div>
</div>

</body>
</html>
